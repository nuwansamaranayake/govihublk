# =============================================================================
# GoviHub Production Nginx Configuration
# HTTP → HTTPS redirect, SSL with Let's Encrypt, security headers,
# rate limiting, SSE for MCP, gzip compression, static asset caching.
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream definitions
# ---------------------------------------------------------------------------

upstream govihub_api {
    server govihub-api:8000;
    keepalive 32;
}

upstream govihub_web {
    server govihub-web:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Rate limiting zones
# ---------------------------------------------------------------------------

# General API — 60 requests/min per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

# Auth endpoints — 10 requests/min per IP (stricter to prevent brute force)
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

# Diagnosis (image upload + ML inference) — 30 requests/min per IP
limit_req_zone $binary_remote_addr zone=api_diagnosis:10m rate=30r/m;

# Advisory (LLM calls) — 20 requests/min per IP
limit_req_zone $binary_remote_addr zone=api_advisory:10m rate=20r/m;

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/ld+json
    image/svg+xml
    font/woff
    font/woff2;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name govihublk.com www.govihublk.com govihub.lk www.govihub.lk;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — Primary server
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name govihublk.com www.govihublk.com govihub.lk www.govihub.lk;

    # ------------------------------------------------------------------
    # SSL configuration (Let's Encrypt via Certbot)
    # ------------------------------------------------------------------

    ssl_certificate     /etc/letsencrypt/live/govihublk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/govihublk.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/govihublk.com/chain.pem;

    # Modern TLS configuration (OWASP recommendation)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS Protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP Strict Transport Security (HSTS) — 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Permissions policy (replaces Feature-Policy)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https://media.govihublk.com https://lh3.googleusercontent.com;
        connect-src 'self' https://accounts.google.com https://api.govihublk.com;
        frame-src https://accounts.google.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    # ------------------------------------------------------------------
    # Client body size (for image uploads in diagnosis)
    # ------------------------------------------------------------------

    client_max_body_size 15M;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ------------------------------------------------------------------
    # Proxy timeouts
    # ------------------------------------------------------------------

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # ------------------------------------------------------------------
    # Auth endpoints (strict rate limiting)
    # ------------------------------------------------------------------

    location /api/v1/auth/ {
        proxy_pass http://govihub_api;
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
    }

    # ------------------------------------------------------------------
    # Diagnosis endpoint (image upload rate limiting)
    # ------------------------------------------------------------------

    location /api/v1/diagnosis/ {
        proxy_pass http://govihub_api;
        limit_req zone=api_diagnosis burst=10 nodelay;
        limit_req_status 429;
        client_max_body_size 15M;
        proxy_read_timeout 180s;
    }

    # ------------------------------------------------------------------
    # Advisory endpoint (LLM calls — longer timeout)
    # ------------------------------------------------------------------

    location /api/v1/advisory/ {
        proxy_pass http://govihub_api;
        limit_req zone=api_advisory burst=5 nodelay;
        limit_req_status 429;
        proxy_read_timeout 300s;
    }

    # ------------------------------------------------------------------
    # General API endpoints
    # ------------------------------------------------------------------

    location /api/ {
        proxy_pass http://govihub_api;
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # MCP SSE endpoint (Server-Sent Events — no buffering)
    # ------------------------------------------------------------------

    location /mcp/sse {
        proxy_pass http://govihub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Cache-Control "no-cache";

        # SSE requires these for correct streaming
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hour SSE connection
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering "no" always;
        add_header Content-Type "text/event-stream" always;
        add_header Cache-Control "no-cache" always;
    }

    # MCP message posting endpoint
    location /mcp/ {
        proxy_pass http://govihub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 120s;
        limit_req zone=api_general burst=10 nodelay;
    }

    # ------------------------------------------------------------------
    # OpenAPI docs (internal use only — restrict in production)
    # ------------------------------------------------------------------

    location /api/v1/docs {
        proxy_pass http://govihub_api;
        # Optionally restrict to admin IPs:
        # allow 10.0.0.0/8;
        # deny all;
    }

    location /api/v1/redoc {
        proxy_pass http://govihub_api;
    }

    location /api/v1/openapi.json {
        proxy_pass http://govihub_api;
    }

    # ------------------------------------------------------------------
    # Static Next.js assets — aggressive caching
    # ------------------------------------------------------------------

    location /_next/static/ {
        proxy_pass http://govihub_web;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location /_next/image {
        proxy_pass http://govihub_web;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        proxy_read_timeout 30s;
    }

    # Next.js webpack hot reload (dev only — no-op in production)
    location /_next/webpack-hmr {
        proxy_pass http://govihub_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # Public static files
    # ------------------------------------------------------------------

    location /favicon.ico {
        proxy_pass http://govihub_web;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /icons/ {
        proxy_pass http://govihub_web;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://govihub_web;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Frontend (Next.js — catch-all)
    # ------------------------------------------------------------------

    location / {
        proxy_pass http://govihub_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;

        # HTML pages should not be cached aggressively
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ------------------------------------------------------------------
    # Hide Nginx version in error pages
    # ------------------------------------------------------------------

    server_tokens off;
}
