<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="GoviHub beta testing is complete. Visit the live spices platform.">
<title>GoviHub — Beta Complete</title>
<link rel="icon" href="/assets/favicon.ico">
<style>
  :root {
    --green: #2D6A2E;
    --green-dark: #1e4a1f;
    --gold: #E8A838;
    --bg: #faf9f4;
    --text: #1a1a1a;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    justify-content: flex-end;
    padding: 16px 20px;
  }
  .lang-toggle {
    display: inline-flex;
    gap: 4px;
    border: 1px solid #d4d0c4;
    border-radius: 999px;
    padding: 4px;
    background: #fff;
  }
  .lang-toggle a {
    padding: 4px 14px;
    border-radius: 999px;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .lang-toggle a.active {
    background: var(--green);
    color: #fff;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 48px;
  }
  .card {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 180px;
    max-width: 55%;
    height: auto;
    margin: 0 auto 32px;
    display: block;
  }
  h1 {
    font-size: clamp(26px, 5vw, 34px);
    line-height: 1.25;
    color: var(--green-dark);
    margin-bottom: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  p {
    font-size: 17px;
    color: #333;
    margin-bottom: 28px;
  }
  .cta {
    display: inline-block;
    background: var(--green);
    color: #fff;
    padding: 14px 32px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    box-shadow: 0 4px 12px rgba(45, 106, 46, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(45, 106, 46, 0.28);
  }
  .secondary {
    margin-top: 32px;
    font-size: 14px;
    color: var(--muted);
  }
  .secondary a { color: var(--green-dark); text-decoration: none; border-bottom: 1px dotted var(--green-dark); }
  .accent {
    width: 60px;
    height: 3px;
    background: var(--gold);
    margin: 20px auto 28px;
    border-radius: 2px;
  }
  footer {
    padding: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    border-top: 1px solid #eee7d3;
  }
  footer a { color: var(--green-dark); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <nav class="lang-toggle" aria-label="Language">
    <a href="/" class="active">EN</a>
    <a href="/si">සි</a>
  </nav>
</header>
<main>
  <div class="card">
    <img class="logo" src="/assets/logo.png" alt="GoviHub">
    <h1>Beta testing is complete. Thank you.</h1>
    <div class="accent" aria-hidden="true"></div>
    <p>You helped us build GoviHub. We are grateful. Our spices platform is now live.</p>
    <a class="cta" href="https://spices.govihublk.com">Visit GoviHub Spices →</a>
    <p class="secondary">Fruits and produce platforms coming soon. Visit <a href="https://govihublk.com">govihublk.com</a> for updates.</p>
  </div>
</main>
<footer>
  Contact <a href="mailto:support@govihublk.com">support@govihublk.com</a> · <a href="https://govihublk.com">govihublk.com</a>
</footer>
</body>
</html>
