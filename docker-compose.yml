version: '3.8'

services:
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - govihub-api
      - govihub-web
    restart: unless-stopped
    networks:
      - govihub-net

  govihub-api:
    build: ./govihub-api
    env_file: .env
    volumes:
      - ./ml/models:/app/ml/models:ro
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - govihub-net

  govihub-web:
    build: ./govihub-web
    env_file: .env.frontend
    depends_on:
      - govihub-api
    restart: unless-stopped
    networks:
      - govihub-net

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: govihub
      POSTGRES_USER: govihub
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govihub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - govihub-net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - govihub-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  govihub-net:
    driver: bridge
