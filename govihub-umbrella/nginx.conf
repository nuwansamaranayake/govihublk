server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Short-TTL HTML so copy updates propagate fast
    location ~ \.html$ {
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Long-TTL static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.ico {
        expires 30d;
        try_files /assets/favicon.ico =404;
    }

    # Clean URLs → html files
    location = / {
        add_header Cache-Control "public, max-age=300" always;
        try_files /index.html =404;
    }
    location = /si {
        add_header Cache-Control "public, max-age=300" always;
        try_files /si.html =404;
    }
    location = /about {
        add_header Cache-Control "public, max-age=300" always;
        try_files /about.html =404;
    }
    location = /about-si {
        add_header Cache-Control "public, max-age=300" always;
        try_files /about-si.html =404;
    }
    location = /contact {
        add_header Cache-Control "public, max-age=300" always;
        try_files /contact.html =404;
    }
    location = /contact-si {
        add_header Cache-Control "public, max-age=300" always;
        try_files /contact-si.html =404;
    }
    location = /privacy {
        add_header Cache-Control "public, max-age=300" always;
        try_files /privacy.html =404;
    }
    location = /terms {
        add_header Cache-Control "public, max-age=300" always;
        try_files /terms.html =404;
    }

    # 404 for anything else
    location / {
        return 404;
    }
}
