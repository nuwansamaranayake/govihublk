version: '3.8'

services:
  govihub-api-beta:
    build:
      context: ./govihub-api
      dockerfile: Dockerfile
    command: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --access-logfile -
    env_file: .env.beta
    ports:
      - "8002:8000"
    depends_on:
      postgres-beta:
        condition: service_healthy
      redis-beta:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    networks:
      - govihub-beta-net

  govihub-web-beta:
    build:
      context: ./govihub-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://beta.govihublk.com/api/v1
        NEXT_PUBLIC_APP_URL: https://beta.govihublk.com
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: dev-placeholder.apps.googleusercontent.com
    env_file: .env.beta.frontend
    ports:
      - "3002:3000"
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    networks:
      - govihub-beta-net

  postgres-beta:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: govihub_beta
      POSTGRES_USER: govihub
      POSTGRES_PASSWORD: ${DB_PASS:-govihub_beta_2026_secure}
    volumes:
      - beta_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govihub -d govihub_beta"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - govihub-beta-net

  redis-beta:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - govihub-beta-net

volumes:
  beta_pgdata:
    driver: local

networks:
  govihub-beta-net:
    driver: bridge
