services:
  govihub-api-beta:
    build:
      context: ./govihub-api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env.beta
    depends_on:
      postgres-beta:
        condition: service_healthy
      redis-beta:
        condition: service_healthy
    restart: unless-stopped

  govihub-web-beta:
    build:
      context: ./govihub-web
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - .env.beta.frontend
    restart: unless-stopped

  postgres-beta:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: govihub_beta
      POSTGRES_USER: govihub
      POSTGRES_PASSWORD: ${DB_PASS:-govihub_beta_2026_secure}
    volumes:
      - beta_pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govihub -d govihub_beta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-beta:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  beta_pgdata:
    driver: local
