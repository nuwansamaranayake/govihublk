version: '3.8'

services:
  govihub-api:
    build:
      context: ./govihub-api
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./govihub-api:/app
      - ./ml/models:/app/ml/models
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
    ports:
      - "8000:8000"

  govihub-web:
    build:
      context: ./govihub-web
      dockerfile: Dockerfile.dev
    command: npm run dev
    volumes:
      - ./govihub-web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
